<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SC Reports</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Cabinet+Grotesk:wght@500;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #07080f;
  --s1: #0e0f1a;
  --s2: #141525;
  --border: #252740;
  --accent: #5b6af0;
  --green: #3ecf8e;
  --pink: #e05c8a;
  --amber: #f0a444;
  --text: #dde1f5;
  --muted: #5a5e80;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: var(--bg); color: var(--text); font-family: 'Cabinet Grotesk', sans-serif; min-height: 100vh; }

/* STATUS BAR */
.status-bar {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 28px; border-bottom: 1px solid var(--border);
  font-family: 'DM Mono', monospace; font-size: 12px; color: var(--muted);
  background: var(--s1);
}
.dot { width: 7px; height: 7px; border-radius: 50%; background: var(--muted); flex-shrink: 0; }
.dot.ok   { background: var(--green); box-shadow: 0 0 7px var(--green); animation: pulse 2.5s infinite; }
.dot.err  { background: var(--pink);  box-shadow: 0 0 7px var(--pink); }
.dot.spin { background: var(--amber); animation: pulse .6s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

/* MAIN */
main { max-width: 1100px; margin: 0 auto; padding: 36px 28px; }

h1 { font-size: 24px; font-weight: 800; letter-spacing: -.5px; margin-bottom: 4px; }
.page-sub { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--muted); margin-bottom: 32px; }

.section-label {
  font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 1px;
  text-transform: uppercase; color: var(--muted); margin-bottom: 14px;
}

/* COMPANY GRID */
.company-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 10px; margin-bottom: 36px;
}
.cc {
  background: var(--s1); border: 1.5px solid var(--border); border-radius: 10px;
  padding: 16px 18px; cursor: pointer; transition: all .15s;
  font-size: 13px; font-weight: 700; line-height: 1.3;
}
.cc:hover { border-color: var(--accent); transform: translateY(-2px); background: var(--s2); }
.cc.sel   { border-color: var(--accent); background: rgba(91,106,240,.12); color: #fff; }

/* DATE SECTION */
.date-section { display: none; animation: fadeIn .25s ease; }
.date-section.visible { display: block; }
@keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

.range-buttons { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 16px; }
.range-btn {
  padding: 9px 20px; border-radius: 8px; border: 1.5px solid var(--border);
  background: var(--s1); color: var(--muted); cursor: pointer;
  font-family: 'Cabinet Grotesk', sans-serif; font-weight: 700; font-size: 13px;
  transition: all .15s;
}
.range-btn:hover  { border-color: var(--accent); color: var(--text); }
.range-btn.active { border-color: var(--accent); background: rgba(91,106,240,.12); color: var(--text); }

.custom-dates {
  display: none; align-items: center; gap: 12px; flex-wrap: wrap;
  margin-bottom: 16px; animation: fadeIn .2s ease;
}
.custom-dates.visible { display: flex; }
.custom-dates label { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); }
input[type=date] {
  background: var(--s2); border: 1px solid var(--border); color: var(--text);
  padding: 9px 13px; border-radius: 8px; font-family: 'DM Mono', monospace;
  font-size: 13px; outline: none; transition: border-color .2s;
}
input[type=date]:focus { border-color: var(--accent); }

/* GENERATE BUTTON */
.btn-generate {
  margin-top: 8px; padding: 12px 32px; border-radius: 10px; border: none;
  background: var(--accent); color: #fff; cursor: pointer;
  font-family: 'Cabinet Grotesk', sans-serif; font-weight: 800; font-size: 15px;
  transition: all .18s; opacity: .35; pointer-events: none;
}
.btn-generate.ready { opacity: 1; pointer-events: all; }
.btn-generate.ready:hover { background: #6b7af5; transform: translateY(-1px); box-shadow: 0 4px 20px rgba(91,106,240,.35); }

.spinner { width: 20px; height: 20px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="status-bar">
  <div class="dot spin" id="connDot"></div>
  <span id="connTxt">Connecting…</span>
</div>

<main>
  <h1>Sales Reports</h1>
  <p class="page-sub">Select a company to get started</p>

  <div class="section-label">Companies</div>
  <div class="company-grid" id="companyGrid">
    <div style="display:flex;align-items:center;gap:10px;color:var(--muted);font-size:13px;grid-column:1/-1">
      <div class="spinner"></div> Loading companies…
    </div>
  </div>

  <div class="date-section" id="dateSection">
    <div class="section-label">Date Range</div>
    <div class="range-buttons">
      <button class="range-btn" onclick="setRange(7, this)">Last 7 days</button>
      <button class="range-btn active" onclick="setRange(30, this)">Last 30 days</button>
      <button class="range-btn" onclick="setRange(90, this)">Last 90 days</button>
      <button class="range-btn" onclick="setRange('custom', this)">Custom…</button>
    </div>
    <div class="custom-dates" id="customDates">
      <label>From</label>
      <input type="date" id="dateFrom" onchange="checkReady()">
      <label>To</label>
      <input type="date" id="dateTo" onchange="checkReady()">
    </div>
    <button class="btn-generate" id="generateBtn" onclick="generate()">Generate Report →</button>
  </div>
</main>

<script>
const GATEWAY = '';

let selectedCompany = null;
let dateFrom = null;
let dateTo   = null;

// default to last 30 days on load
(function() {
  const now = new Date(), from = new Date();
  from.setDate(now.getDate() - 30);
  dateFrom = fmt(from);
  dateTo   = fmt(now);
})();

window.onload = async () => { await init(); };

async function init() {
  try {
    const r = await fetch(`${GATEWAY}/api/companies`);
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const d = await r.json();
    if (d.error) throw new Error(d.error);
    const companies = d.Items || d.items || [];
    if (!companies.length) throw new Error('No companies returned');
    setConn('ok', 'Connected · ' + companies.length + ' companies');
    renderCompanies(companies);
  } catch(e) {
    setConn('err', 'Connection failed — ' + e.message);
    document.getElementById('companyGrid').innerHTML =
      `<p style="color:var(--pink);font-size:13px;grid-column:1/-1">Failed to load: ${e.message}</p>`;
  }
}

function renderCompanies(list) {
  document.getElementById('companyGrid').innerHTML = list.map(c => {
    const id   = c.ID || c.Id || '?';
    const name = c.CompanyName || c.Name || 'Company ' + id;
    return `<div class="cc" data-id="${id}" onclick="selectCompany(this, ${id}, '${name.replace(/'/g,"\\'")}')">
      ${name}
    </div>`;
  }).join('');
}

function selectCompany(el, id, name) {
  document.querySelectorAll('.cc').forEach(c => c.classList.remove('sel'));
  el.classList.add('sel');
  selectedCompany = { id, name };
  document.getElementById('dateSection').classList.add('visible');
  checkReady();
}

function setRange(days, btn) {
  if (btn) {
    document.querySelectorAll('.range-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  }
  const customDates = document.getElementById('customDates');
  if (days === 'custom') {
    customDates.classList.add('visible');
    dateFrom = document.getElementById('dateFrom').value || null;
    dateTo   = document.getElementById('dateTo').value   || null;
  } else {
    customDates.classList.remove('visible');
    const now = new Date(), from = new Date();
    from.setDate(now.getDate() - days);
    dateFrom = fmt(from);
    dateTo   = fmt(now);
  }
  checkReady();
}

function fmt(d) { return d.toISOString().split('T')[0]; }

function checkReady() {
  if (document.getElementById('customDates').classList.contains('visible')) {
    dateFrom = document.getElementById('dateFrom').value || null;
    dateTo   = document.getElementById('dateTo').value   || null;
  }
  const ready = !!(selectedCompany && dateFrom && dateTo);
  document.getElementById('generateBtn').classList.toggle('ready', ready);
}

function generate() {
  if (!selectedCompany || !dateFrom || !dateTo) return;
  // Stage 3: pull orders and render report
  alert(`Stage 3 coming next!\n\nCompany: ${selectedCompany.name} (ID: ${selectedCompany.id})\nFrom: ${dateFrom}\nTo: ${dateTo}`);
}

function setConn(state, txt) {
  document.getElementById('connDot').className = 'dot ' + state;
  document.getElementById('connTxt').textContent = txt;
}
</script>
</body>
</html>
